<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#242424"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#cardGrad)"/>

  <!-- Yellow accent strip top-left -->
  <rect x="0" y="0" width="6" height="450" fill="#f5c518"/>

  <!-- Top-right corner tag -->
  <rect x="660" y="0" width="140" height="36" rx="0" fill="#7ac143"/>
  <text x="730" y="23" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="white" letter-spacing="1">LIVE PROJECT</text>

  <!-- ── Left column: big stat cards ──────────────────── -->
  <!-- Card 1 -->
  <rect x="32" y="52" width="190" height="110" rx="12" fill="#242424" stroke="#333" stroke-width="1"/>
  <text x="52" y="90" font-family="Arial,sans-serif" font-size="34" font-weight="800" fill="#7ac143">450K+</text>
  <text x="52" y="112" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">People trained</text>
  <text x="52" y="128" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">in security</text>
  <!-- small green bar -->
  <rect x="52" y="144" width="60" height="3" rx="2" fill="#7ac143"/>

  <!-- Card 2 -->
  <rect x="32" y="178" width="190" height="110" rx="12" fill="#242424" stroke="#333" stroke-width="1"/>
  <text x="52" y="216" font-family="Arial,sans-serif" font-size="34" font-weight="800" fill="#f5c518">95%</text>
  <text x="52" y="238" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Pass rate,</text>
  <text x="52" y="254" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">first time</text>
  <rect x="52" y="270" width="44" height="3" rx="2" fill="#f5c518"/>

  <!-- Card 3 -->
  <rect x="32" y="304" width="190" height="110" rx="12" fill="#242424" stroke="#333" stroke-width="1"/>
  <text x="52" y="342" font-family="Arial,sans-serif" font-size="34" font-weight="800" fill="white">3 wks</text>
  <text x="52" y="364" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Trained &amp; ready</text>
  <text x="52" y="380" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">to earn</text>
  <rect x="52" y="396" width="50" height="3" rx="2" fill="rgba(255,255,255,0.25)"/>

  <!-- ── Centre column: main content ──────────────────── -->
  <!-- Brand mark -->
  <rect x="254" y="52" width="38" height="38" rx="6" fill="none" stroke="#7ac143" stroke-width="2.5"/>
  <polyline points="261,71 270,80 292,60" fill="none" stroke="#7ac143" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="302" y="69" font-family="Arial,sans-serif" font-size="13" font-weight="800" fill="white" letter-spacing="1">GET</text>
  <text x="302" y="84" font-family="Arial,sans-serif" font-size="13" font-weight="800" fill="white" letter-spacing="1">LICENSED</text>

  <!-- Divider -->
  <line x1="254" y1="106" x2="540" y2="106" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Headline -->
  <text x="254" y="142" font-family="Arial,sans-serif" font-size="22" font-weight="800" fill="white">Security Training</text>
  <text x="254" y="168" font-family="Arial,sans-serif" font-size="22" font-weight="800" fill="#7ac143">&amp; Licensing</text>
  <text x="254" y="194" font-family="Arial,sans-serif" font-size="22" font-weight="800" fill="white">Platform</text>

  <!-- Description -->
  <text x="254" y="224" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.55)">UK's leading security training provider.</text>
  <text x="254" y="240" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.55)">Earn £14–£25/hr with flexible job placements.</text>

  <!-- Course pills -->
  <rect x="254" y="260" width="88" height="26" rx="13" fill="rgba(122,193,67,0.15)" stroke="#7ac143" stroke-width="1"/>
  <text x="298" y="277" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="600" fill="#7ac143">SIA Licence</text>

  <rect x="352" y="260" width="88" height="26" rx="13" fill="rgba(245,197,24,0.1)" stroke="#f5c518" stroke-width="1"/>
  <text x="396" y="277" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="600" fill="#f5c518">Door Supervisor</text>

  <rect x="254" y="296" width="88" height="26" rx="13" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="298" y="313" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.6)">CCTV Operator</text>

  <rect x="352" y="296" width="88" height="26" rx="13" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="396" y="313" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.6)">First Aid</text>

  <!-- Tech stack used -->
  <text x="254" y="352" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" letter-spacing="1">BUILT WITH</text>
  <rect x="254" y="362" width="48" height="20" rx="4" fill="rgba(97,218,251,0.1)" stroke="rgba(97,218,251,0.25)" stroke-width="1"/>
  <text x="278" y="376" text-anchor="middle" font-family="monospace" font-size="9" fill="#61DAFB">React</text>
  <rect x="310" y="362" width="48" height="20" rx="4" fill="rgba(36,150,237,0.1)" stroke="rgba(36,150,237,0.25)" stroke-width="1"/>
  <text x="334" y="376" text-anchor="middle" font-family="monospace" font-size="9" fill="#2496ED">Docker</text>
  <rect x="366" y="362" width="48" height="20" rx="4" fill="rgba(100,181,246,0.1)" stroke="rgba(100,181,246,0.25)" stroke-width="1"/>
  <text x="390" y="376" text-anchor="middle" font-family="monospace" font-size="9" fill="#64B5F6">Cloud</text>
  <rect x="422" y="362" width="40" height="20" rx="4" fill="rgba(247,223,30,0.1)" stroke="rgba(247,223,30,0.25)" stroke-width="1"/>
  <text x="442" y="376" text-anchor="middle" font-family="monospace" font-size="9" fill="#F7DF1E">JS</text>

  <!-- ── Right column: visual chart ───────────────────── -->
  <!-- Background panel -->
  <rect x="572" y="52" width="196" height="360" rx="14" fill="#1e1e1e" stroke="#2e2e2e" stroke-width="1"/>

  <text x="670" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="rgba(255,255,255,0.5)" letter-spacing="1">SUCCESS RATE</text>

  <!-- Big donut ring -->
  <circle cx="670" cy="174" r="62" fill="none" stroke="#2e2e2e" stroke-width="14"/>
  <!-- Green arc ~95% of circumference ≈ 390 of 410 -->
  <circle cx="670" cy="174" r="62" fill="none" stroke="#7ac143" stroke-width="14"
    stroke-dasharray="370 20" stroke-dashoffset="20" stroke-linecap="round"
    transform="rotate(-90 670 174)"/>
  <text x="670" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="800" fill="white">95%</text>
  <text x="670" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">pass rate</text>

  <!-- Divider -->
  <line x1="590" y1="256" x2="750" y2="256" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Mini bar chart -->
  <text x="600" y="278" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Monthly enrolments</text>

  <!-- Bars -->
  <rect x="600" y="340" width="18" height="46" rx="4" fill="rgba(122,193,67,0.3)"/>
  <rect x="626" y="322" width="18" height="64" rx="4" fill="rgba(122,193,67,0.5)"/>
  <rect x="652" y="306" width="18" height="80" rx="4" fill="rgba(122,193,67,0.7)"/>
  <rect x="678" y="292" width="18" height="94" rx="4" fill="#7ac143"/>
  <rect x="704" y="310" width="18" height="76" rx="4" fill="rgba(245,197,24,0.6)"/>
  <rect x="730" y="296" width="18" height="90" rx="4" fill="#f5c518"/>

  <!-- X-axis labels -->
  <text x="609" y="400" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">Aug</text>
  <text x="635" y="400" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">Sep</text>
  <text x="661" y="400" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">Oct</text>
  <text x="687" y="400" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#7ac143">Nov</text>
  <text x="713" y="400" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="rgba(255,255,255,0.3)">Dec</text>
  <text x="739" y="400" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#f5c518">Jan</text>

  <!-- Bottom URL tag -->
  <rect x="32" y="424" width="736" height="1" fill="rgba(255,255,255,0.05)"/>
  <text x="400" y="442" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.2)">get-licensed.co.uk</text>
</svg>
